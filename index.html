<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClearRun – Window Cleaning Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- HEADER -->
  <header>
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">🪟</span>
        <span class="logo-text">ClearRun</span>
      </div>
      <nav class="tab-nav">
        <button class="tab-btn active" data-tab="today">Today's Run</button>
        <button class="tab-btn" data-tab="schedule">Schedule</button>
        <button class="tab-btn" data-tab="customers">Customers</button>
      </nav>
    </div>
  </header>

  <!-- MAIN CONTENT -->
  <main>

    <!-- ===== TODAY'S RUN TAB ===== -->
    <section id="tab-today" class="tab-content active">

      <div class="run-header">
        <div>
          <h1 id="today-date-label">Today</h1>
          <div class="run-stats" id="run-stats">
            <span class="stat"><span id="stat-total">0</span> jobs</span>
            <span class="stat-sep">·</span>
            <span class="stat"><span id="stat-done">0</span> done</span>
            <span class="stat-sep">·</span>
            <span class="stat">£<span id="stat-value">0.00</span></span>
          </div>
        </div>
        <div class="run-actions">
          <button class="btn btn-outline" onclick="openAddJobModal()">+ Add Job</button>
          <button class="btn btn-ghost icon-btn" onclick="toggleRouteMode()" id="route-btn" title="Reorder route">⇅</button>
        </div>
      </div>

      <div class="progress-bar-wrap">
        <div class="progress-bar" id="progress-bar"></div>
      </div>

      <div id="jobs-list" class="jobs-list">
        <div class="empty-state" id="jobs-empty">
          <span>🧹</span>
          <p>No jobs scheduled for today.<br>Add one or check the Schedule tab.</p>
        </div>
      </div>
    </section>

    <!-- ===== SCHEDULE TAB ===== -->
    <section id="tab-schedule" class="tab-content">
      <div class="section-header">
        <h1>Schedule</h1>
        <div class="view-toggle">
          <button class="view-btn active" data-view="week" onclick="setScheduleView('week', this)">Week</button>
          <button class="view-btn" data-view="month" onclick="setScheduleView('month', this)">Month</button>
        </div>
      </div>

      <div class="calendar-nav">
        <button class="btn btn-ghost" onclick="calNav(-1)">←</button>
        <span id="cal-label"></span>
        <button class="btn btn-ghost" onclick="calNav(1)">→</button>
      </div>

      <div id="schedule-grid" class="schedule-grid"></div>
    </section>

    <!-- ===== CUSTOMERS TAB ===== -->
    <section id="tab-customers" class="tab-content">
      <div class="section-header">
        <h1>Customers</h1>
        <button class="btn btn-outline" onclick="openCustomerModal()">+ New Customer</button>
      </div>
      <input type="text" class="search-input" placeholder="🔍  Search customers…" oninput="filterCustomers(this.value)" />
      <div id="customers-list" class="customers-list">
        <div class="empty-state" id="customers-empty">
          <span>👤</span>
          <p>No customers yet.<br>Add your first customer above.</p>
        </div>
      </div>
    </section>

  </main>

  <!-- ===== ADD / EDIT JOB MODAL ===== -->
  <div id="job-modal" class="modal-overlay">
    <div class="modal-box">
      <div class="modal-header">
        <h2 id="job-modal-title">Add Job</h2>
        <button class="close-btn" onclick="closeJobModal()">✕</button>
      </div>
      <div class="form-group">
        <label>Customer</label>
        <select id="job-customer">
          <option value="">— Select customer —</option>
        </select>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Date</label>
          <input type="date" id="job-date" />
        </div>
        <div class="form-group">
          <label>Time</label>
          <input type="time" id="job-time" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Price (£)</label>
          <input type="number" id="job-price" placeholder="0.00" step="0.01" min="0" />
        </div>
        <div class="form-group">
          <label>PVC Cleaning</label>
          <div class="toggle-wrap">
            <label class="toggle">
              <input type="checkbox" id="job-pvc" />
              <span class="toggle-slider"></span>
            </label>
            <span class="toggle-label" id="pvc-label">No</span>
          </div>
        </div>
      </div>
      <div class="form-group">
        <label>Notes</label>
        <textarea id="job-notes" rows="2" placeholder="Access codes, special instructions…"></textarea>
      </div>
      <div class="form-group">
        <label>Recurring</label>
        <select id="job-recurring">
          <option value="none">One-off</option>
          <option value="weekly">Weekly</option>
          <option value="fortnightly">Fortnightly</option>
          <option value="monthly">Monthly</option>
          <option value="bimonthly">Every 2 months</option>
        </select>
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeJobModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveJob()">Save Job</button>
      </div>
      <input type="hidden" id="job-edit-id" />
    </div>
  </div>

  <!-- ===== CUSTOMER MODAL ===== -->
  <div id="customer-modal" class="modal-overlay">
    <div class="modal-box">
      <div class="modal-header">
        <h2 id="customer-modal-title">New Customer</h2>
        <button class="close-btn" onclick="closeCustomerModal()">✕</button>
      </div>
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="cust-name" placeholder="Jane Smith" />
      </div>
      <div class="form-group">
        <label>Address</label>
        <input type="text" id="cust-address" placeholder="12 Main Street" />
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Town / City</label>
          <input type="text" id="cust-town" placeholder="Belfast" />
        </div>
        <div class="form-group">
          <label>Postcode</label>
          <input type="text" id="cust-postcode" placeholder="BT1 1AA" />
        </div>
      </div>
      <div class="form-group">
        <label>Phone</label>
        <input type="tel" id="cust-phone" placeholder="07700 000000" />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="cust-email" placeholder="jane@example.com" />
      </div>
      <div class="form-group">
        <label>Notes</label>
        <textarea id="cust-notes" rows="2" placeholder="Gate code, dog on site…"></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn btn-ghost" onclick="closeCustomerModal()">Cancel</button>
        <button class="btn btn-primary" onclick="saveCustomer()">Save Customer</button>
      </div>
      <input type="hidden" id="cust-edit-id" />
    </div>
  </div>

  <!-- ===== CUSTOMER HISTORY MODAL ===== -->
  <div id="history-modal" class="modal-overlay">
    <div class="modal-box wide">
      <div class="modal-header">
        <h2 id="history-title">Customer History</h2>
        <button class="close-btn" onclick="closeHistoryModal()">✕</button>
      </div>
      <div id="history-body"></div>
    </div>
  </div>

  <!-- TOAST -->
  <div id="toast" class="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
</body>
</html>
